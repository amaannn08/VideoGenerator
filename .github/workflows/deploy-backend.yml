name: Deploy Backend to EC2

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/ai-video
            git pull --ff-only origin main
            cd backend
            npm ci
            if pm2 describe ai-video-backend > /dev/null 2>&1; then
              pm2 restart ai-video-backend --update-env
            else
              pm2 start server.js --name ai-video-backend
            fi
            pm2 save
            # Give app/Nginx a moment to become healthy after restart.
            ok=0
            for i in 1 2 3 4 5 6; do
              code="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/auth/verify || true)"
              if [ "$code" = "200" ] || [ "$code" = "401" ]; then
                ok=1
                break
              fi
              sleep 5
            done
            [ "$ok" -eq 1 ] || (echo "Backend failed health check" && exit 1)
